<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Invoicing Dashboard</title>
    <style>
        :root { --navy: #0f172a; --blue: #2563eb; --green: #16a34a; --red: #dc2626;
            --slate100: #f1f5f9; --slate200: #e2e8f0; --slate500: #64748b; --slate800: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--slate100); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px; width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-logo { width: 48px; height: 48px; background: var(--green); border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: white; margin-bottom: 16px; }
        .login-title { font-size: 20px; font-weight: 700; color: var(--navy); }
        .login-subtitle { font-size: 13px; color: var(--slate500); margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--slate800);
            margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--slate200);
            border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .form-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login { width: 100%; padding: 12px; background: var(--blue); color: white; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
        .btn-login:hover { opacity: 0.9; }
        .error-msg { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; border-radius: 8px;
            padding: 10px 14px; font-size: 13px; margin-bottom: 20px; text-align: center; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 11px; color: var(--slate500); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="login-logo">EI</div>
        <div class="login-title">E-Invoicing Dashboard</div>
        <div class="login-subtitle">Sage X3 &mdash; FIRS Nigeria</div>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="footer-text">Nigeria E-Invoicing Portal &bull; Cryptware Systems</div>
</div>

</body>
</html>
